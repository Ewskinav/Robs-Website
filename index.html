<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 200px;
            height: 100%;
            background-color: #333;
            color: white;
            padding: 20px;
        }
        .content {
            margin-left: 220px;
            padding: 20px;
        }
        .profile {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .profile img {
            width: 100%;
            height: auto;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
        }
        .gallery img {
            margin: 10px;
            width: calc(33.33% - 20px);
            height: auto;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Artist Description</h2>
        <p>Welcome to my art portfolio! Here you can explore my latest works and learn more about me as an artist.</p>
    </div>
    <div class="content">
        <div class="gallery">
            <img src="image1.jpg" alt="Artwork 1">
            <img src="image2.jpg" alt="Artwork 2">
            <img src="image3.jpg" alt="Artwork 3">
            <img src="image4.jpg" alt="Artwork 4">
            <img src="image5.jpg" alt="Artwork 5">
            <img src="image6.jpg" alt="Artwork 6">
        </div>
    </div>
    <div class="profile">
        <img src="profile.jpg" alt="Profile Image">
    </div>
</body>
</html>
